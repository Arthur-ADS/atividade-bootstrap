<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Notícias</title>
    <link rel="stylesheet" href="css\bootstrap.min.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card h-100 p-3 d-flex flex-column">
                    <img src="img\news1.jpg" class="card-img-top" alt="Notícia Principal">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">IA na Guerra</h5>
                        <p class="card-text flex-grow-1">Como a inteligência artificial tem sido utilizada em conflitos militares.</p>
                        <button type="button" class="btn btn-secondary">Ler Mais</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 p-3 d-flex flex-column">
                    <img src="img\news2.jpg" class="card-img-top" alt="Notícia Secundária">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">A bolha de IA vai estourar?</h5>
                        <p class="card-text flex-grow-1">Entenda porque crescem temores de uma bolha especulativa.</p>
                        <button type="button" class="btn btn-secondary">Ler Mais</button>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card h-100 p-3 d-flex flex-column">
                    <img src="img\news3.jpg" class="card-img-top" alt="Notícia Menor">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Novo iPhone</h5>
                        <p class="card-text flex-grow-1">As novidades do modelo mais recente lançado pela Apple.</p>
                        <button type="button" class="btn btn-secondary">Ler Mais</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
