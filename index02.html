<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos de Serviços</title>
    <link rel="stylesheet" href="css\bootstrap.min.css">
</head>
<body>
    <div class="container my-5">
        <div class="row g-5">
            <div class="col">
                <div class="card h-100 p-2 d-flex flex-column">
                    <h3>Plano Básico</h3>
                    <p>R$ 99,90</p>
                    <ul class="list-group flex-grow-1">
                        <li class="list-group-item">Plano pós-pago para o seu celular.</li>
                    </ul>
                    <button type="button" class="btn btn-primary mt-3">Assinar</button>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 p-2 d-flex flex-column">
                    <h3>Plano Intermediário</h3>
                    <p>R$ 149,90</p>
                    <ul class="list-group flex-grow-1">
                        <li class="list-group-item">Plano pós-pago para o seu celular.</li>
                        <li class="list-group-item">Internet fibra.</li>
                    </ul>
                    <button type="button" class="btn btn-primary mt-3">Assinar</button>
                </div>    
            </div>
            <div class="col">
                <div class="card h-100 p-2 d-flex flex-column">
                    <h3>Plano Luxo</h3>
                    <p>R$ 179,90</p>
                    <ul class="list-group flex-grow-1">
                        <li class="list-group-item">Plano pós-pago para o seu celular.</li>
                        <li class="list-group-item">Internet fibra.</li>
                        <li class="list-group-item">TV a cabo.</li>
                    </ul>
                    <button type="button" class="btn btn-primary mt-3">Assinar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
